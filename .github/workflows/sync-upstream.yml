name: Sync upstream

on:
  schedule:
    # Daily at 00:00 UTC. GitHub schedules can drift by minutes under load.
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sync-upstream
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Merge upstream into fork main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          git config user.email "actions@github.com"
          git config user.name "compound-law-sync-bot"

          git remote add upstream https://github.com/anthropics/skills.git
          git fetch upstream main

          UPSTREAM=$(git rev-parse upstream/main)
          FORK=$(git rev-parse HEAD)
          echo "Pre-sync:"
          echo "  fork:     $FORK"
          echo "  upstream: $UPSTREAM"

          if git merge-base --is-ancestor "$UPSTREAM" "$FORK"; then
            echo "Fork already contains upstream HEAD; nothing to do."
            exit 0
          fi

          # ff when possible, merge commit on divergence.
          # Never force-push — preserves history and keeps the local cron's `git pull --ff-only` happy.
          git merge upstream/main --no-edit -m "Sync upstream anthropics/skills @ ${UPSTREAM}"
          git push origin main

          echo "Post-sync:"
          echo "  fork: $(git rev-parse HEAD)"
